<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>UrbanBites Email Verification</title>
</head>
<body style="margin:0;padding:0;background:#f4f6fb;font-family:Arial,sans-serif;">
<table width="100%" cellspacing="0" cellpadding="0" style="padding:24px 0;background:#f4f6fb;">
	<tr>
		<td align="center">
			<table width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.08);">
				<tr>
					<td style="background:linear-gradient(135deg,#06b6d4,#3b82f6);padding:24px;color:#ffffff;">
						<h1 style="margin:0;font-size:24px;">UrbanBites</h1>
						<p style="margin:8px 0 0 0;font-size:14px;opacity:0.92;">Email Verification OTP</p>
					</td>
				</tr>
				<tr>
					<td style="padding:28px;">
						<p style="margin:0 0 12px 0;font-size:16px;color:#222;">Hi {{name}},</p>
						<p style="margin:0 0 18px 0;font-size:14px;line-height:1.6;color:#555;">Use this OTP to verify your email address.</p>
						<div style="text-align:center;margin:22px 0;">
							<span style="display:inline-block;letter-spacing:6px;font-size:28px;font-weight:700;background:#eef8ff;color:#2563eb;border:1px dashed #60a5fa;border-radius:10px;padding:14px 22px;">{{otp}}</span>
						</div>
						<p style="margin:0 0 10px 0;font-size:14px;color:#555;">This OTP expires at <strong>{{expiresAt}}</strong>.</p>
					</td>
				</tr>
			</table>
		</td>
	</tr>
</table>
</body>
</html>
