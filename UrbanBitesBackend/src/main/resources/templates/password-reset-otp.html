<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>UrbanBites Password Reset OTP</title>
</head>
<body style="margin:0;padding:0;background:#f4f6fb;font-family:Arial,sans-serif;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f6fb;padding:24px 0;">
	<tr>
		<td align="center">
			<table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.08);">
				<tr>
					<td style="background:linear-gradient(135deg,#ff6a00,#ff3d67);padding:24px;color:#ffffff;">
						<h1 style="margin:0;font-size:24px;">UrbanBites</h1>
						<p style="margin:8px 0 0 0;font-size:14px;opacity:0.92;">Password Reset OTP</p>
					</td>
				</tr>
				<tr>
					<td style="padding:28px;">
						<p style="margin:0 0 12px 0;font-size:16px;color:#222;">Hi {{name}},</p>
						<p style="margin:0 0 18px 0;font-size:14px;line-height:1.6;color:#555;">
							We received a password reset request. Use this OTP to continue.
						</p>
						<div style="text-align:center;margin:22px 0;">
							<span style="display:inline-block;letter-spacing:6px;font-size:28px;font-weight:700;background:#fff3ef;color:#ff3d67;border:1px dashed #ff956b;border-radius:10px;padding:14px 22px;">{{otp}}</span>
						</div>
						<p style="margin:0 0 10px 0;font-size:14px;color:#555;">This OTP expires at <strong>{{expiresAt}}</strong>.</p>
						<p style="margin:0;font-size:13px;color:#7b7b7b;line-height:1.6;">If you did not request this, ignore this email.</p>
					</td>
				</tr>
			</table>
		</td>
	</tr>
</table>
</body>
</html>
