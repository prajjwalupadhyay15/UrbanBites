<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UrbanBites Payment Receipt</title>
</head>
<body style="margin:0;padding:0;background:#fffaf2;font-family:Arial,sans-serif;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 0;background:#fffaf2;">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:16px;overflow:hidden;border:1px solid #f1e2bd;">
                <tr>
                    <td style="background:linear-gradient(135deg,#F7B538,#780116);padding:24px;color:#ffffff;text-align:center;">
                        <h1 style="margin:0;font-size:24px;">UrbanBites</h1>
                        <p style="margin:8px 0 0 0;font-size:14px;">💳 Payment Receipt</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:28px;text-align:center;">
                        <p style="margin:0 0 12px 0;font-size:16px;color:#2a2a2a;">Hi {{name}},</p>
                        <h2 style="margin:0 0 12px 0;font-size:22px;color:#780116;">{{title}}</h2>
                        <p style="margin:0 0 14px 0;font-size:14px;color:#5b4d3e;line-height:1.7;">{{message}}</p>
                        <p style="margin:0;font-size:13px;color:#7a6a58;">Reference: <strong>{{referenceLabel}}</strong></p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:16px 28px 28px 28px;text-align:center;">
                        <p style="margin:0;font-size:12px;color:#a0937e;">If you have questions about this payment, please contact our support team.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
