<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UrbanBites Security Alert</title>
</head>
<body style="margin:0;padding:0;background:#f4f6fb;font-family:Arial,sans-serif;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f6fb;padding:24px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.08);">
                <tr>
                    <td style="background:linear-gradient(135deg,#ef4444,#f97316);padding:24px;color:#ffffff;">
                        <h1 style="margin:0;font-size:24px;">UrbanBites</h1>
                        <p style="margin:8px 0 0 0;font-size:14px;opacity:0.95;">Security Alert</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:28px;">
                        <p style="margin:0 0 12px 0;font-size:16px;color:#222;">Hi {{name}},</p>
                        <p style="margin:0 0 16px 0;font-size:14px;line-height:1.7;color:#4b5563;">
                            We noticed a login to your account from a new place or device.
                        </p>
                        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#fff8f5;border:1px solid #fecaca;border-radius:10px;padding:12px;">
                            <tr><td style="font-size:13px;color:#374151;padding:4px 0;"><strong>IP:</strong> {{ipAddress}}</td></tr>
                            <tr><td style="font-size:13px;color:#374151;padding:4px 0;"><strong>Location:</strong> {{locationLabel}}</td></tr>
                            <tr><td style="font-size:13px;color:#374151;padding:4px 0;"><strong>Device:</strong> {{deviceInfo}}</td></tr>
                            <tr><td style="font-size:13px;color:#374151;padding:4px 0;"><strong>Time:</strong> {{loginAt}}</td></tr>
                        </table>
                        <p style="margin:16px 0 0 0;font-size:13px;color:#6b7280;line-height:1.6;">
                            If this was you, no action is required. If not, reset your password immediately.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
