<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>UrbanBites Notification</title>
</head>
<body style="margin:0;padding:0;background:#f3f4f6;font-family:Arial,sans-serif;">
<table width="100%" cellspacing="0" cellpadding="0" style="padding:24px 0;background:#f3f4f6;">
	<tr>
		<td align="center">
			<table width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:14px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.08);">
				<tr>
					<td style="background:#111827;padding:20px;color:#ffffff;">
						<h1 style="margin:0;font-size:24px;">UrbanBites</h1>
						<p style="margin:8px 0 0 0;font-size:14px;color:#d1d5db;">Order & Payment Updates</p>
					</td>
				</tr>
				<tr>
					<td style="padding:26px;">
						<p style="margin:0 0 10px 0;font-size:16px;color:#1f2937;">Hi {{name}},</p>
						<h2 style="margin:0 0 12px 0;font-size:22px;color:#111827;">{{title}}</h2>
						<p style="margin:0 0 14px 0;font-size:14px;color:#4b5563;line-height:1.6;">{{message}}</p>
						<p style="margin:0;font-size:13px;color:#6b7280;">Reference: <strong>{{referenceLabel}}</strong></p>
					</td>
				</tr>
			</table>
		</td>
	</tr>
</table>
</body>
</html>
