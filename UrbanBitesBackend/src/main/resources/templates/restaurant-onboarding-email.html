<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UrbanBites Restaurant Update</title>
</head>
<body style="margin:0;padding:0;background:#f4f6fb;font-family:Arial,sans-serif;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f6fb;padding:24px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.08);">
                <tr>
                    <td style="background:linear-gradient(135deg,#16a34a,#22c55e);padding:24px;color:#ffffff;">
                        <h1 style="margin:0;font-size:24px;">UrbanBites</h1>
                        <p style="margin:8px 0 0 0;font-size:14px;opacity:0.95;">Restaurant Onboarding</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:28px;">
                        <p style="margin:0 0 12px 0;font-size:16px;color:#222;">Hi {{name}},</p>
                        <h2 style="margin:0 0 10px 0;font-size:20px;color:#111827;">{{title}}</h2>
                        <p style="margin:0 0 14px 0;font-size:14px;line-height:1.7;color:#4b5563;">
                            Restaurant: <strong>{{restaurantName}}</strong>
                        </p>
                        <p style="margin:0;font-size:14px;color:#4b5563;line-height:1.7;">{{message}}</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
