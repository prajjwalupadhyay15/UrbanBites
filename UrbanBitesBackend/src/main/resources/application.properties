spring.application.name=UrbanBites
server.port=${PORT:8081}
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/urbanbites}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/urbanbites}


jwt.secret=${JWT_SECRET:change-this-to-a-long-random-secret-key-with-at-least-32-bytes}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

app.email.enabled=${APP_EMAIL_ENABLED:true}
app.email.from=${APP_EMAIL_FROM:prajjwalupadhyay15@gmail.com}
app.sms.enabled=${APP_SMS_ENABLED:false}
app.push.enabled=${APP_PUSH_ENABLED:false}

spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIMEOUT:5000}

spring.servlet.multipart.max-file-size=${APP_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${APP_MAX_REQUEST_SIZE:10MB}
app.image.provider=${APP_IMAGE_PROVIDER:cloudinary}
app.upload.dir=${APP_UPLOAD_DIR:C:/Users/UJJWAL/Desktop/UrbanBites/UrbanBitesBackend/uploads}
app.cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
app.cloudinary.api-key=${CLOUDINARY_API_KEY:}
app.cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
app.cloudinary.folder-root=${CLOUDINARY_FOLDER_ROOT:urbanbites}
app.websocket.allowed-origins=${APP_WEBSOCKET_ALLOWED_ORIGINS:http://localhost:5173}

payment.razorpay.enabled=${PAYMENT_RAZORPAY_ENABLED:true}
payment.razorpay.key-id=${PAYMENT_RAZORPAY_KEY_ID:}
payment.razorpay.key-secret=${PAYMENT_RAZORPAY_KEY_SECRET:}
payment.razorpay.webhook-secret=${PAYMENT_RAZORPAY_WEBHOOK_SECRET:}
payment.razorpay.base-url=${PAYMENT_RAZORPAY_BASE_URL:https://api.razorpay.com}

dispatch.offer-ttl-seconds=${DISPATCH_OFFER_TTL_SECONDS:120}
dispatch.max-attempts=${DISPATCH_MAX_ATTEMPTS:5}
dispatch.timeout-sweep-ms=${DISPATCH_TIMEOUT_SWEEP_MS:15000}
dispatch.reassignment-cooldown-seconds=${DISPATCH_REASSIGNMENT_COOLDOWN_SECONDS:15}
dispatch.no-agent-retry-window-seconds=${DISPATCH_NO_AGENT_RETRY_WINDOW_SECONDS:300}
dispatch.no-agent-retry-interval-seconds=${DISPATCH_NO_AGENT_RETRY_INTERVAL_SECONDS:30}
dispatch.max-location-age-seconds=${DISPATCH_MAX_LOCATION_AGE_SECONDS:120}
dispatch.pickup-sla-seconds=${DISPATCH_PICKUP_SLA_SECONDS:300}

tracking.assumed-speed-kmph=${TRACKING_ASSUMED_SPEED_KMPH:25}
tracking.max-timeline-points=${TRACKING_MAX_TIMELINE_POINTS:100}
tracking.smoothing-alpha=${TRACKING_SMOOTHING_ALPHA:0.6}
tracking.max-jump-km=${TRACKING_MAX_JUMP_KM:2.5}
tracking.min-ping-interval-seconds=${TRACKING_MIN_PING_INTERVAL_SECONDS:2}
tracking.min-emit-distance-meters=${TRACKING_MIN_EMIT_DISTANCE_METERS:20}
tracking.min-emit-eta-delta-minutes=${TRACKING_MIN_EMIT_ETA_DELTA_MINUTES:1}

geocoding.nominatim-url=${GEOCODING_NOMINATIM_URL:https://nominatim.openstreetmap.org/search}
geocoding.user-agent=${GEOCODING_USER_AGENT:UrbanBites/1.0 (support@urbanbites.local)}

