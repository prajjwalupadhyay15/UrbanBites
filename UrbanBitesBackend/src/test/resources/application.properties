spring.datasource.url=jdbc:h2:mem:urbanbites;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=false
spring.data.mongodb.uri=mongodb://localhost:27017/urbanbites-test?serverSelectionTimeoutMS=200

jwt.secret=test-secret-key-with-at-least-32-bytes-length
jwt.expiration-ms=3600000
jwt.refresh-expiration-ms=604800000

app.email.enabled=false
app.sms.enabled=false
app.push.enabled=false

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=target/test-uploads

payment.razorpay.enabled=false
payment.razorpay.key-id=test_key
payment.razorpay.key-secret=test_secret
payment.razorpay.webhook-secret=test-signature
payment.razorpay.base-url=https://api.razorpay.com

dispatch.offer-ttl-seconds=1
dispatch.max-attempts=5
dispatch.timeout-sweep-ms=1000
dispatch.reassignment-cooldown-seconds=1
dispatch.no-agent-retry-window-seconds=8
dispatch.no-agent-retry-interval-seconds=1
dispatch.max-location-age-seconds=120
dispatch.pickup-sla-seconds=2

tracking.assumed-speed-kmph=25
tracking.max-timeline-points=50
tracking.smoothing-alpha=0.6
tracking.max-jump-km=2.5

